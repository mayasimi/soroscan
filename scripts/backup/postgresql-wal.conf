# ---------------------------------------------------------------------------
# PostgreSQL WAL archiving configuration for PITR
#
# Add these settings to your postgresql.conf (or mount as a config override).
# Requires the postgres container to have the wal_archive.sh script available
# and S3 env vars set.
# ---------------------------------------------------------------------------

# Enable WAL archiving
wal_level = replica
archive_mode = on
archive_command = '/scripts/wal_archive.sh %p %f'
archive_timeout = 300          # Force WAL switch every 5 minutes at most

# Replication / PITR settings
max_wal_senders = 3
wal_keep_size = 512            # MB — keep 512 MB of WAL locally as buffer

# Recovery (set in postgresql.conf for PG12+, or recovery.conf for older)
# Uncomment during PITR restore:
# restore_command = '/scripts/wal_restore.sh %f %p'
# recovery_target_time = '2025-01-15 03:00:00 UTC'   # Example PITR target
# recovery_target_action = 'promote'
